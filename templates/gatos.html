{% extends 'base.html' %}

{% block conteudo %}
<main class="container py-5">
    <div class="row g-5"> <!-- g-5 dá o espaçamento largo entre as colunas -->

        {% if gatos %}
            {% for gato in gatos %}
            <div class="col-12 col-md-6 col-lg-4">
                <article class="card card-breed">

                    <div class="card-img-container">
                        <!-- Verifique se o campo é .url ou .image.url no seu banco -->
                        <img src="{{ gato.image }}" alt="{{ gato.name }}">
                    </div>

                    <div class="card-body p-0">
                        <h2 class="h4 fw-bold text-brand-deep-blue mb-2">{{ gato.name }}</h2>


                        <div class="accent-line"></div>

                        <div class="d-flex flex-wrap gap-3 mb-3">
                            <div class="stat-item">
                                <i class="fas fa-weight-hanging stat-icon"></i>
                                <span>{{ gato.weight.metric }} kg</span>
                            </div>
                            <div class="stat-item">
                                <i class="fas fa-hourglass-half stat-icon"></i>
                                <span>{{ gato.life_span }} anos</span>
                            </div>
                        </div>

                        <p class="card-text text-muted small lh-lg">
                            {{ gato.description }}
                        </p>
                    </div>
                </article>
            </div>
            {% endfor %} <!-- O LOOP DEVE TERMINAR AQUI -->
        {% else %}
            <div class="col-12 text-center">
                <h3>Nenhum pet disponível para adoção.</h3>
            </div>
        {% endif %}

    </div> <!-- FIM DA ROW -->
</main>
{% endblock %}
