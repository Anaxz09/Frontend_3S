<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>


<div class="menu">
    <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('calculos') }}">Cálculos</a></li>
        <li><a href="{{ url_for('funcionarios') }}">Funcionários</a></li>
        <li><a href="{{ url_for('animais') }}">Animais</a></li>
        <li><a href="{{ url_for('listar_gatos') }}">Gatos</a></li>
        {% if current_user.is_authenticated %}
        <li><a data-bs-toggle="modal" data-bs-target="#modalLogout" href="{{current_user.nome}}"></a></li>
        {%else%}
        <li><a href="{{ url_for('login') }}">Login</a></li>
        {% endif %}
    </ul>
</div>


<div class="conteudo">
    {% block conteudo %}

    {% endblock %}
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script src="/static/js/verificacoes.js"></script>
<script src="/static/js/apis.js"></script>

</body>
</html>
