{% extends 'base.html' %}

{% block conteudo %}
<div class="login-container">
    <div class="login-box">
        <div class="perfil-icon"></div>
        <form action="{{ url_for('funcionarios')}}" method="post">
            <input type="text" name="form-nome" placeholder="nome" class="login-input">

            <input type="email" name="form-email" placeholder="@gmail.com" class="login-input">

            <input type="password" name="form-senha" placeholder="senha" class="login-input form-control">

            <button type="submit" class="btn-login">Cadastre-se</button>
            <a class="btn btn-danger my-2" onclick="limpaInputslogin()">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
